<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>밥약맵 - 식당 탐색</title>
  <meta name="description" content="Bab 밥 Navigation for U — 부산대 맛집·카페 길잡이" />
  <meta property="og:title" content="Bab 밥 in PNU" />
  <meta property="og:description" content="Bab 밥 Navigation for U — 부산대 맛집·카페 길잡이" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pnueat-backend.onrender.com" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Bab 밥 in PNU" />
  <meta name="twitter:description" content="Bab 밥 Navigation for U — 부산대 맛집·카페 길잡이" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #e8e8e8;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Poppins', 'Apple SD Gothic Neo', sans-serif;
    }

    .phone {
      width: 430px;
      height: 100vh;
      min-height: 700px;
      background: #fff;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    /* ── 헤더 (홈과 동일) ── */
    .header {
      background: #fff;
      padding: 20px 31px 0;
      flex-shrink: 0;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
    }
    .logo-bnu { display: block; line-height: 0; }
    .logo-bnu img { height: 24px; width: auto; display: block; }
    .header-sub {
      font-family: 'Poppins', sans-serif;
      font-size: 11.52px;
      font-weight: 500;
      color: #000;
      letter-spacing: -0.46px;
      text-align: center;
      line-height: 1.6;
    }
    .header-sub .blue { color: #005ba9; font-weight: 700; }
    .bab-slot {
      display: inline-block;
      overflow: hidden;
      height: 1.1em;
      vertical-align: middle;
      position: relative;
      top: -0.05em;
    }
    .bab-slot-inner {
      display: flex;
      flex-direction: column;
      animation: babRoll 2.6s ease-out infinite 0.8s;
    }
    .bab-slot-inner span {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 1.1em;
      line-height: 1.1;
      white-space: nowrap;
    }
    .bab-slot-inner .bab-emoji img { height: 0.9em; width: auto; vertical-align: middle; }
    @keyframes babRoll {
      0%   { transform: translateY(0); }
      30%  { transform: translateY(0); }
      50%  { transform: translateY(-1.1em); }
      80%  { transform: translateY(-1.1em); }
      95%  { transform: translateY(0); }
      100% { transform: translateY(0); }
    }
    .account-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      font-size: 14px;
    }
    .account-icon img { width: 100%; height: 100%; object-fit: cover; }
    .header-divider { height: 1px; background: #e8e8e8; margin: 0 -31px; }

    /* ── 검색줄 ── */
    .search-section {
      padding: 14px 31px 0;
      background: #fff;
      flex-shrink: 0;
    }
    .search-row {
      display: flex;
      gap: 11px;
      margin-bottom: 14px;
    }
    .search-box {
      flex: 1;
      height: 44px;
      background: #f4f4f4;
      border: 1px solid #dcdcdc;
      border-radius: 25px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
    }
    .search-box svg { width: 16px; height: 16px; flex-shrink: 0; }
    .search-box input {
      border: none;
      outline: none;
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 13px;
      color: #333;
      width: 100%;
      background: transparent;
    }
    .search-box input::placeholder { color: #aaa; }
    .filter-btn {
      width: 47px;
      height: 44px;
      border: 0.5px solid #aaa;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }
    .filter-btn svg { width: 24px; height: 24px; }
    .filter-btn.active { background: #005ba9; border-color: #005ba9; }
    .filter-btn.active svg path { fill: #fff; }

    /* ── 카테고리 칩 ── */
    .category-scroll {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 14px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-x;
    }
    .category-scroll::-webkit-scrollbar { display: none; }
    .cat-tab {
      flex-shrink: 0;
      height: 29px;
      padding: 0 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 0.5px solid #828282;
      border-radius: 22px;
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.48px;
      color: #000;
      background: #fff;
      white-space: nowrap;
      cursor: pointer;
    }
    .cat-tab.active {
      border-color: #005ba9;
      background: #005ba9;
      color: #fff;
      font-weight: 700;
    }

    /* ── 뷰 전환 ── */
    .view-toggle {
      display: flex;
      border-top: 1px solid #bbb;
      border-bottom: 1px solid #bbb;
      background: #fff;
      flex-shrink: 0;
    }
    .view-btn {
      flex: 1;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.48px;
      color: #696969;
      background: #fff;
      cursor: pointer;
    }
    .view-btn.active {
      background: linear-gradient(180deg, #fff 50.962%, #ffe398 100%);
      color: #ea8100;
      font-weight: 800;
    }

    /* ── 결과 바 (알약) ── */
    .result-bar {
      margin: 12px 17px;
      height: 48px;
      border-radius: 65px;
      background: linear-gradient(90deg, #fff 0%, #ddf0ff 100%);
      box-shadow: 0 1px 4px rgba(0, 91, 169, 0.5);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px 0 26px;
      flex-shrink: 0;
    }
    .result-count {
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.48px;
      color: #000;
    }
    .result-count span { color: #005ba9; font-weight: 700; }
    .sort-row { display: flex; gap: 8px; }
    .sort-btn {
      height: 29px;
      padding: 0 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.48px;
      color: #000;
      border: 0.5px solid #828282;
      border-radius: 22px;
      background: #fff;
      cursor: pointer;
    }
    .sort-btn.active {
      border-color: #005ba9;
      background: #005ba9;
      color: #fff;
      font-weight: 700;
    }

    /* ── 지도뷰 ── */
    #mapView {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    #map { flex: 1; min-height: 200px; background: #f4f4f4; }

    /* 선택된 식당 바 */
    .route-info {
      display: none;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      background: #005ba9;
      color: #fff;
      flex-shrink: 0;
    }
    .route-info.show { display: flex; }
    .route-name {
      font-family: 'Poppins', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .route-detail {
      font-family: 'Poppins', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      letter-spacing: -0.12px;
      white-space: nowrap;
    }
    .route-close {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 13px;
      line-height: 1;
    }

    /* 지도 하단 리스트 (2개 높이, 스크롤 가능) */
    .map-list {
      height: 126px; /* 63px 카드 2개 */
      overflow-y: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .map-list::-webkit-scrollbar { display: none; }
    .map-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 63px;
      padding: 0 16px;
      border-bottom: 1px solid #bbb;
      gap: 10px;
      cursor: pointer;
      background: #fff;
    }
    .map-card:first-child { border-top: 1px solid #bbb; }
    .map-card:active { background: #f8f8f8; }
    .map-card.highlighted {
      background: #ddf0ff;
      border-color: #005ba9;
    }
    .map-card-left {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }
    .map-card-icon {
      width: 36px;
      height: 36px;
      background: #f4f4f4;
      border: 0.55px solid #dcdcdc;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .map-card-icon img { width: 100%; height: 100%; object-fit: cover; }
    .map-card.highlighted .map-card-icon { background: #fff; border-color: #fff; }
    .map-card-name {
      font-family: 'Poppins', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: -0.12px;
      color: #000;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .map-card.highlighted .map-card-name { color: #005ba9; }
    .map-card-meta {
      font-family: 'Poppins', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      letter-spacing: -0.12px;
      color: #616161;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .map-card.highlighted .map-card-meta { color: #5888b2; }

    /* 클러스터/마커 (Leaflet divIcon) */
    .cluster-badge {
      background: #005ba9;
      color: #fff;
      border: 2.5px solid #fff;
      border-radius: 50%;
      box-shadow: 0 1px 5px rgba(0, 40, 80, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      width: 100%;
      height: 100%;
    }
    .pin-badge {
      background: #fff;
      border: 2px solid #005ba9;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      width: 100%;
      height: 100%;
    }
    .pin-badge.cafe { border-color: #ffbe0c; }

    /* ── 리스트뷰 ── */
    .list-scroll {
      flex: 1;
      overflow-y: auto;
      display: none;
      min-height: 0;
      scrollbar-width: none;
    }
    .list-scroll::-webkit-scrollbar { display: none; }
    .restaurant-card {
      display: flex;
      gap: 12px;
      padding: 14px 31px;
      border-bottom: 1px solid #e8e8e8;
      cursor: pointer;
    }
    .restaurant-card:active { background: #f8f8f8; }
    .card-thumb {
      width: 72px;
      height: 72px;
      background: #f4f4f4;
      border: 1px solid #dcdcdc;
      border-radius: 12px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      overflow: hidden;
    }
    .card-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .card-name {
      font-family: 'Poppins', 'Apple SD Gothic Neo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.15px;
      color: #191919;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }
    .tag {
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: -0.44px;
      color: #005ba9;
      background: #ddf0ff;
      border-radius: 22px;
      padding: 3px 9px;
    }
    .tag.cafe { background: #fff4d5; color: #ea8100; }
    .tag.visited { background: #e8f8ee; color: #2eaa61; font-size: 10px; }
    .card-desc {
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 2px;
    }
    .card-dist {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: #005ba9;
    }
    .bookmark-btn {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
    }
    .bookmark-btn svg { width: 19px; height: 17px; }
    .bookmark-btn svg path { transition: fill 0.15s; }
    .bookmark-btn.bump { animation: heartBump 0.45s ease; }
    @keyframes heartBump {
      0% { transform: scale(1); }
      30% { transform: scale(1.4); }
      55% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .particle {
      position: absolute;
      top: 50%; left: 50%;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4141;
      pointer-events: none;
      z-index: 4;
      animation: particleBurst 0.7s ease-out forwards;
    }
    @keyframes particleBurst {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); opacity: 0; }
    }

    /* ── 빈 상태 ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 10px;
    }
    .empty-icon { font-size: 40px; }
    .empty-text { font-size: 14px; color: #aaa; }
    .loading { text-align: center; padding: 60px 20px; font-size: 14px; color: #aaa; }

    /* ── 하단 네비 (홈과 동일) ── */
    .bottom-nav {
      height: 73px;
      background: #fff;
      border-top: 1px solid #eee;
      display: flex;
      align-items: center;
      box-shadow: 0 0 3px rgba(0,0,0,0.25);
      flex-shrink: 0;
      z-index: 200;
    }
    .nav-item {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      cursor: pointer;
    }
    .nav-icon-svg { width: 26px; height: 26px; fill: none; }
    .nav-icon-svg path, .nav-icon-svg circle { stroke: #bbb; stroke-width: 2; }
    .nav-item.active .nav-icon-svg path,
    .nav-item.active .nav-icon-svg circle { stroke: #005ba9; }

    /* ── 필터 바텀시트 ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1100; /* Leaflet 컨트롤(z-index 1000)보다 위 */
      justify-content: center;
      align-items: flex-end;
    }
    .overlay.open { display: flex; }
    .filter-sheet {
      width: 430px;
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 20px 24px 32px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 0 auto 16px;
    }
    .sheet-title {
      font-family: 'Poppins', 'Apple SD Gothic Neo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #191919;
      margin-bottom: 16px;
    }
    .filter-section { margin-bottom: 20px; }
    .filter-label {
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      color: #888;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      height: 29px;
      padding: 0 15px;
      display: flex;
      align-items: center;
      border: 0.5px solid #828282;
      border-radius: 22px;
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: -0.48px;
      color: #000;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip.active {
      border-color: #005ba9;
      background: #005ba9;
      color: #fff;
      font-weight: 700;
    }
    .sheet-btn {
      width: 100%;
      height: 48px;
      background: #005ba9;
      color: #fff;
      border: none;
      border-radius: 24px;
      font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    .sheet-btn:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="phone">

    <!-- ── 헤더 (홈과 동일) ── -->
    <div class="header">
      <div class="header-top">
        <a class="logo-bnu" href="/home"><img src="/static/images/logo-bnu.svg" alt="BNU"></a>
        <div class="header-sub">
          <div>
            <span class="bab-slot">
              <div class="bab-slot-inner">
                <span>Bab</span>
                <span class="bab-emoji"><img src="/static/images/bab-emoji.png" alt="밥" /></span>
              </div>
            </span>
            &nbsp;in <span class="blue">PNU</span>,
          </div>
          <div>
            <span class="bab-slot">
              <div class="bab-slot-inner">
                <span>Bab</span>
                <span class="bab-emoji"><img src="/static/images/bab-emoji.png" alt="밥" /></span>
              </div>
            </span>
            &nbsp;Navigation for U
          </div>
        </div>
        <div class="account-icon" id="authArea">👤</div>
      </div>
      <div class="header-divider"></div>
    </div>

    <!-- ── 검색 + 카테고리 ── -->
    <div class="search-section">
      <div class="search-row">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#828282" stroke-width="2"/><path d="M16.5 16.5L21 21" stroke="#828282" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="searchInput" type="text" placeholder="식당 이름, 카테고리 검색" />
        </div>
        <div class="filter-btn" id="filterBtn" onclick="openFilter()">
          <svg viewBox="0 0 24 24" fill="none"><path d="m9.25 22-.4-3.2q-.325-.125-.612-.3-.288-.175-.563-.375L4.7 19.375l-2.75-4.75 2.575-1.95Q4.5 12.5 4.5 12.337v-.675q0-.162.025-.337L1.95 9.375l2.75-4.75 2.975 1.25q.275-.2.575-.375.3-.175.6-.3l.4-3.2h5.5l.4 3.2q.325.125.613.3.287.175.562.375l2.975-1.25 2.75 4.75-2.575 1.95q.025.175.025.338v.674q0 .163-.05.338l2.575 1.95-2.75 4.75-2.95-1.25q-.275.2-.575.375-.3.175-.6.3l-.4 3.2Zm2.8-6.5q1.45 0 2.475-1.025Q15.55 13.45 15.55 12q0-1.45-1.025-2.475Q13.5 8.5 12.05 8.5q-1.475 0-2.488 1.025Q8.55 10.55 8.55 12q0 1.45 1.012 2.475Q10.575 15.5 12.05 15.5Z" fill="#1C1B1F"/></svg>
        </div>
      </div>
      <div class="category-scroll" id="categoryScroll">
        <div class="cat-tab active" onclick="selectCategory('전체')">전체</div>
      </div>
    </div>

    <!-- ── 뷰 전환 (지도뷰 우선) ── -->
    <div class="view-toggle">
      <div class="view-btn active" id="mapViewBtn" onclick="switchView('map')">지도뷰</div>
      <div class="view-btn" id="listViewBtn" onclick="switchView('list')">리스트뷰</div>
    </div>

    <!-- ── 결과 바 (리스트뷰 전용) ── -->
    <div class="result-bar" id="resultBar" style="display:none">
      <div class="result-count">총 <span id="resultCount">-</span> 개</div>
      <div class="sort-row">
        <div class="sort-btn active" data-sort="거리순" onclick="setSort('거리순')">거리순</div>
        <div class="sort-btn" data-sort="카테고리" onclick="setSort('카테고리')">카테고리</div>
      </div>
    </div>

    <!-- ── 지도뷰 ── -->
    <div id="mapView">
      <div id="map"></div>
      <div class="route-info" id="routeInfo">
        <div class="route-name" id="routeName"></div>
        <div class="route-detail" id="routeDetail"></div>
        <div class="route-close" onclick="clearRoute()">✕</div>
      </div>
      <div class="map-list" id="mapList"></div>
    </div>

    <!-- ── 리스트뷰 ── -->
    <div class="list-scroll" id="listView">
      <div class="loading">불러오는 중...</div>
    </div>

    <!-- ── 하단 네비 (홈과 동일) ── -->
    <nav class="bottom-nav">
      <div class="nav-item" onclick="location.href='/home'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z" stroke-linejoin="round"/>
          <path d="M9 21V12h6v9" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="nav-item active">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none">
          <circle cx="11" cy="11" r="7"/>
          <path d="M16.5 16.5L21 21" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="nav-item" onclick="location.href='/recommend'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6L12 2z" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="nav-item" onclick="location.href='/mylist'">
        <svg class="nav-icon-svg" viewBox="0 0 24 24" fill="none">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke-width="1.8" stroke-linejoin="round"/>
        </svg>
      </div>
    </nav>

  </div>

  <!-- 필터 바텀시트 -->
  <div class="overlay" id="filterOverlay" onclick="handleOverlayClick(event)">
    <div class="filter-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">필터</div>

      <div class="filter-section">
        <div class="filter-label">종류</div>
        <div class="chip-row" id="typeChips">
          <div class="chip active" data-type="전체" onclick="selectType(this)">전체</div>
          <div class="chip" data-type="food" onclick="selectType(this)">밥집</div>
          <div class="chip" data-type="cafe" onclick="selectType(this)">카페</div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">거리</div>
        <div class="chip-row" id="distChips">
          <div class="chip active" data-dist="전체" onclick="selectDist(this)">전체</div>
          <div class="chip" data-dist="300" onclick="selectDist(this)">300m 이내</div>
          <div class="chip" data-dist="500" onclick="selectDist(this)">500m 이내</div>
          <div class="chip" data-dist="1000" onclick="selectDist(this)">1km 이내</div>
        </div>
      </div>

      <div class="filter-section">
        <div class="filter-label">카테고리</div>
        <div class="chip-row" id="catChips"></div>
      </div>

      <button class="sheet-btn" onclick="applyFilter()">적용하기</button>
    </div>
  </div>

  <script src="/static/auth.js"></script>
  <script src="/static/collections.js"></script>
  <script>
    // ── 상태 ──
    let allItems = [];
    let currentCategory = '전체';
    let currentSort = '거리순';
    let searchQuery = '';
    let currentView = 'map';
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
    let visited = JSON.parse(localStorage.getItem('visited') || '[]');
    let showBookmarksOnly = false;
    let leafletMap = null;
    let leafletMarkers = [];
    let mapReady = false;

    // 필터 임시 상태
    let pendingType = '전체';
    let pendingDist = '전체';
    let pendingCat = '전체';

    // 적용된 필터
    let filterType = '전체';
    let filterDist = '전체';

    // 카테고리 이모지 매핑
    const catEmoji = {
      '돈까스·회': '🍱', '한식': '🍚', '치킨': '🍗', '피자·버거': '🍔',
      '분식': '🥢', '중식': '🥡', '일식': '🍣', '양식': '🍝',
      '고기': '🥩', '고기·구이': '🥩', '카페·디저트': '☕', '패스트푸드': '🍔', '아시아': '🍜', '기타': '🍽'
    };

    // 카테고리 칩 (피그마 순서 고정)
    const CATEGORIES = ['전체', '한식', '중식', '일식', '양식', '아시아', '분식', '패스트푸드', '카페', '치킨', '기타'];
    const MAIN_CATS = ['한식', '중식', '일식', '양식', '아시아', '분식', '패스트푸드', '치킨'];

    // 데이터의 대분류 표기를 칩에 매핑 (예: 돈까스·회 → 일식, 아시안 → 아시아)
    const CAT_ALIAS = {
      '한식': ['한식', '찜·탕', '고기', '고기·구이'],
      '일식': ['일식', '돈까스·회'],
      '아시아': ['아시아', '아시안'],
      '패스트푸드': ['패스트푸드', '피자·버거'],
    };
    const FASTFOOD_RE = /버거|피자|맥도날드|롯데리아|맘스터치|서브웨이|KFC|파파이스|쉑쉑/i;

    function matchCategory(item, cat) {
      if (cat === '전체') return true;
      if (cat === '카페') return item._type === 'cafe';
      if (cat === '기타') {
        // 어느 메인 칩에도 매칭되지 않는 식당
        return item._type !== 'cafe' && !MAIN_CATS.some(mc => matchCategory(item, mc));
      }
      const c = item['대분류'];
      if (cat === '패스트푸드') {
        return CAT_ALIAS['패스트푸드'].includes(c) || FASTFOOD_RE.test(item['이름']);
      }
      const alias = CAT_ALIAS[cat];
      return alias ? alias.includes(c) : c === cat;
    }

    function getEmoji(item) {
      return catEmoji[item['대분류']] || (item._type === 'cafe' ? '☕' : '🍽');
    }

    // ── 데이터 로드 ──
    async function loadData() {
      try {
        const [food, cafe] = await Promise.all([
          fetch('/api/food').then(r => r.json()),
          fetch('/api/cafe').then(r => r.json()),
        ]);
        allItems = [
          ...food.map(i => ({ ...i, _type: 'food' })),
          ...cafe.map(i => ({ ...i, _type: 'cafe' })),
        ];
        renderCategories();
        renderFilterCatChips();
        render();
      } catch (e) {
        document.getElementById('listView').innerHTML =
          '<div class="empty-state"><div class="empty-icon">😅</div><div class="empty-text">데이터를 불러오지 못했어요</div></div>';
      }
    }

    // ── 필터링 ──
    function getFilteredItems() {
      let items = [...allItems];

      if (showBookmarksOnly) {
        items = items.filter(i => bookmarks.includes(i['이름']));
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        items = items.filter(i =>
          i['이름'].toLowerCase().includes(q) ||
          (i['대분류'] || '').toLowerCase().includes(q) ||
          (i['카테고리'] || '').toLowerCase().includes(q)
        );
      }

      if (currentCategory !== '전체') {
        items = items.filter(i => matchCategory(i, currentCategory));
      }

      if (filterType === 'food') items = items.filter(i => i._type === 'food');
      if (filterType === 'cafe') items = items.filter(i => i._type === 'cafe');

      if (filterDist !== '전체') {
        const maxDist = parseInt(filterDist);
        items = items.filter(i => i['거리(m)'] !== '-' && parseInt(i['거리(m)']) <= maxDist);
      }

      if (currentSort === '거리순') {
        items.sort((a, b) => {
          const da = a['거리(m)'] === '-' ? 9999 : parseInt(a['거리(m)']);
          const db = b['거리(m)'] === '-' ? 9999 : parseInt(b['거리(m)']);
          return da - db;
        });
      } else {
        items.sort((a, b) => (a['대분류'] || '').localeCompare(b['대분류'] || ''));
      }

      return items;
    }

    // ── 카테고리 탭 (피그마 순서) ──
    function renderCategories() {
      const scroll = document.getElementById('categoryScroll');
      scroll.innerHTML = CATEGORIES.map(c => `
        <div class="cat-tab ${c === currentCategory ? 'active' : ''}" onclick="selectCategory('${c}')">${c}</div>
      `).join('');
    }

    function selectCategory(cat) {
      currentCategory = cat;
      renderCategories();
      render();
    }

    // ── 정렬 ──
    function setSort(sort) {
      currentSort = sort;
      document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sort === sort);
      });
      render();
    }

    // ── 북마크 ──
    function isBookmarked(name) {
      return bookmarks.includes(name);
    }

    // ── 뷰 전환 ──
    function switchView(view) {
      currentView = view;
      document.getElementById('listViewBtn').classList.toggle('active', view === 'list');
      document.getElementById('mapViewBtn').classList.toggle('active', view === 'map');
      document.getElementById('listView').style.display = view === 'list' ? 'block' : 'none';
      document.getElementById('mapView').style.display = view === 'map' ? 'flex' : 'none';
      document.getElementById('resultBar').style.display = view === 'list' ? 'flex' : 'none';

      if (view === 'map') {
        renderMap();
        // 컨테이너 표시 직후 지도 크기 재계산
        if (leafletMap) setTimeout(() => leafletMap.invalidateSize(), 60);
      }
    }

    // ── 리스트 렌더 ──
    function render() {
      const items = getFilteredItems();
      document.getElementById('resultCount').textContent = items.length;

      renderList(items);
      if (currentView === 'map') renderMap();
    }

    function renderList(items) {
      if (items.length === 0) {
        document.getElementById('listView').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">${showBookmarksOnly ? '🔖' : '🔍'}</div>
            <div class="empty-text">${showBookmarksOnly ? '저장된 식당이 없어요' : '검색 결과가 없어요'}</div>
          </div>`;
        return;
      }

      // 필터된 아이템을 인덱스로 참조하기 위해 저장
      window._renderedItems = items;

      document.getElementById('listView').innerHTML = items.map((item, idx) => {
        const dist = item['거리(m)'] !== '-' ? `${item['거리(m)']}m` : '';
        const walk = item['도보시간'] !== '-' ? `🚶 ${item['도보시간']}` : '';
        const distText = [walk, dist].filter(Boolean).join(' · ');
        const isCafe = item._type === 'cafe';
        const saved = isBookmarked(item['이름']);
        const gone = visited.includes(item['이름']);
        const photo = item['사진'] || (item['사진목록'] && item['사진목록'][0]);
        const thumbHtml = photo
          ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" onerror="this.parentElement.innerHTML='${getEmoji(item)}';">`
          : getEmoji(item);
        return `
          <div class="restaurant-card" data-idx="${idx}">
            <div class="card-thumb">${thumbHtml}</div>
            <div class="card-info">
              <div class="card-name">${item['이름']}</div>
              <div class="card-meta">
                <div class="tag ${isCafe ? 'cafe' : ''}">${item['대분류'] || item['카테고리']}</div>
                ${gone ? '<div class="tag visited">✅ 가본 곳</div>' : ''}
              </div>
              <div class="card-desc">📍 ${item['주소'] || '-'}</div>
              <div class="card-bottom">
                <div class="card-dist">${distText}</div>
                <div class="bookmark-btn" data-idx="${idx}">
                  <svg viewBox="0 0 21.6667 19.8792" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10.8333 19.8792L9.2625 18.4708C7.43889 16.8278 5.93125 15.4104 4.73958 14.2188C3.54792 13.0271 2.6 11.9573 1.89583 11.0094C1.19167 10.0615 0.699653 9.19028 0.419792 8.39583C0.139931 7.60139 0 6.78889 0 5.95833C0 4.26111 0.56875 2.84375 1.70625 1.70625C2.84375 0.56875 4.26111 0 5.95833 0C6.89722 0 7.79097 0.198611 8.63958 0.595833C9.48819 0.993056 10.2194 1.55278 10.8333 2.275C11.4472 1.55278 12.1785 0.993056 13.0271 0.595833C13.8757 0.198611 14.7694 0 15.7083 0C17.4056 0 18.8229 0.56875 19.9604 1.70625C21.0979 2.84375 21.6667 4.26111 21.6667 5.95833C21.6667 6.78889 21.5267 7.60139 21.2469 8.39583C20.967 9.19028 20.475 10.0615 19.7708 11.0094C19.0667 11.9573 18.1187 13.0271 16.9271 14.2188C15.7354 15.4104 14.2278 16.8278 12.4042 18.4708L10.8333 19.8792Z" fill="${saved ? '#ff4141' : '#ddd'}"/></svg>
                </div>
              </div>
            </div>
          </div>`;
      }).join('');
    }

    // ── 지도 초기화 ──
    const PNU = { lat: 35.2323, lng: 129.0876 };

    function hasRealCoord(item) {
      // 좌표가 없거나 부산대 정문 기본값으로 채워진 항목 제외
      return item.lat && item.lng &&
        !(Math.abs(item.lat - PNU.lat) < 0.0002 && Math.abs(item.lng - PNU.lng) < 0.0002);
    }

    function loadLeaflet() {
      return new Promise(resolve => {
        if (window.L) { resolve(); return; }
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
        document.head.appendChild(link);
        const s = document.createElement('script');
        s.onload = resolve;
        s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        document.head.appendChild(s);
      });
    }

    async function initMap() {
      await loadLeaflet();

      leafletMap = L.map('map', { attributionControl: false, zoomControl: true })
        .setView([PNU.lat, PNU.lng], 16);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(leafletMap);

      const pnuIcon = L.divIcon({
        html: '<div style="background:#191919;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.5)"></div>',
        iconSize: [12, 12], iconAnchor: [6, 6], className: '',
      });
      L.marker([PNU.lat, PNU.lng], { icon: pnuIcon })
        .bindPopup('📍 부산대 정문').addTo(leafletMap);

      // 줌 변경 시 클러스터 다시 계산
      leafletMap.on('zoomend', () => renderClusters(getFilteredItems()));

      mapReady = true;
    }

    // ── 지도 렌더 ──
    function renderMap() {
      const items = getFilteredItems();

      if (!mapReady) {
        if (!renderMap._initStarted) {
          renderMap._initStarted = true;
          document.getElementById('map').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:13px">🗺 지도 로딩 중...</div>';
          initMap().then(() => {
            renderClusters(getFilteredItems());
            renderMapList(getFilteredItems());
            setTimeout(() => leafletMap.invalidateSize(), 60);
          });
        }
        return;
      }

      renderClusters(items);
      renderMapList(items);
    }

    // ── 클러스터링: 가까운 식당끼리 묶어서 개수 표시 ──
    const CLUSTER_RADIUS_PX = 48;

    function buildClusters(items) {
      const clusters = [];
      items.filter(hasRealCoord).forEach(item => {
        const p = leafletMap.latLngToLayerPoint([item.lat, item.lng]);
        const found = clusters.find(c => c.point.distanceTo(p) < CLUSTER_RADIUS_PX);
        if (found) {
          found.items.push(item);
          // 클러스터 중심 = 포함된 점들의 평균
          found.point = L.point(
            (found.point.x * (found.items.length - 1) + p.x) / found.items.length,
            (found.point.y * (found.items.length - 1) + p.y) / found.items.length
          );
        } else {
          clusters.push({ point: p, items: [item] });
        }
      });
      return clusters;
    }

    function renderClusters(items) {
      if (!mapReady) return;
      leafletMarkers.forEach(m => leafletMap.removeLayer(m));
      leafletMarkers = [];

      buildClusters(items).forEach(cluster => {
        if (cluster.items.length === 1) {
          // 단일 마커: 카테고리 이모지 핀
          const item = cluster.items[0];
          const isCafe = item._type === 'cafe';
          const icon = L.divIcon({
            html: `<div class="pin-badge ${isCafe ? 'cafe' : ''}">${getEmoji(item)}</div>`,
            iconSize: [30, 30], iconAnchor: [15, 15], className: '',
          });
          const marker = L.marker([item.lat, item.lng], { icon })
            .addTo(leafletMap)
            .on('click', () => selectItem(item));
          leafletMarkers.push(marker);
        } else {
          // 클러스터 마커: 개수 표시, 클릭하면 확대
          const latlng = leafletMap.layerPointToLatLng(cluster.point);
          const n = cluster.items.length;
          const size = n >= 10 ? 44 : n >= 5 ? 38 : 33;
          const icon = L.divIcon({
            html: `<div class="cluster-badge" style="font-size:${n >= 10 ? 14 : 12}px">${n}</div>`,
            iconSize: [size, size], iconAnchor: [size / 2, size / 2], className: '',
          });
          const marker = L.marker(latlng, { icon })
            .addTo(leafletMap)
            .on('click', () => {
              const z = leafletMap.getZoom();
              if (z >= 19) { selectItem(cluster.items[0]); return; }
              leafletMap.setView(latlng, Math.min(z + 2, 19));
            });
          leafletMarkers.push(marker);
        }
      });
    }

    function selectItem(item) {
      const items = getFilteredItems();
      const idx = items.findIndex(i => i['이름'] === item['이름']);
      showRoute(item, idx);
    }

    function showRoute(item, listIdx) {
      if (!item.lat || !item.lng) return;
      highlightMapCard(listIdx);
      leafletMap.setView([item.lat, item.lng], Math.max(leafletMap.getZoom(), 17));
      document.getElementById('routeName').textContent = item['이름'];
      const walkText = item['도보시간'] !== '-' ? `🚶 ${item['도보시간']}` : '';
      const distText = item['거리(m)'] !== '-' ? `${item['거리(m)']}m` : '';
      document.getElementById('routeDetail').textContent = [walkText, distText].filter(Boolean).join(' · ');
      document.getElementById('routeInfo').classList.add('show');
    }

    function clearRoute() {
      document.getElementById('routeInfo').classList.remove('show');
      document.querySelectorAll('.map-card').forEach(el => el.classList.remove('highlighted'));
      if (leafletMap) leafletMap.setView([PNU.lat, PNU.lng], 16);
    }

    function renderMapList(items) {
      document.getElementById('mapList').innerHTML = items.map((item, idx) => {
        const dist = item['거리(m)'] !== '-' ? item['거리(m)'] + 'm' : '';
        const walk = item['도보시간'] !== '-' ? item['도보시간'] : '';
        const meta = [walk, dist, item['대분류']].filter(Boolean).join(' · ');
        const photo = item['사진'] || (item['사진목록'] && item['사진목록'][0]);
        const iconHtml = photo
          ? `<img src="${photo}" loading="lazy" onerror="this.parentElement.innerHTML='${getEmoji(item)}';">`
          : getEmoji(item);
        return `
          <div class="map-card" id="mc-${idx}" onclick="focusMarker(${idx})">
            <div class="map-card-left">
              <div class="map-card-icon">${iconHtml}</div>
              <div class="map-card-name">${item['이름']}</div>
            </div>
            <div class="map-card-meta">${!hasRealCoord(item) ? '위치 없음' : meta}</div>
          </div>`;
      }).join('');
    }

    function focusMarker(listIdx) {
      const items = getFilteredItems();
      const item = items[listIdx];
      if (!item) return;
      if (!hasRealCoord(item)) {
        // 좌표 없는 항목은 상세 페이지로
        sessionStorage.setItem('detailItem', JSON.stringify(item));
        location.href = '/detail';
        return;
      }
      showRoute(item, listIdx);
    }

    function highlightMapCard(idx) {
      document.querySelectorAll('.map-card').forEach(el => el.classList.remove('highlighted'));
      const el = document.getElementById(`mc-${idx}`);
      if (el) { el.classList.add('highlighted'); el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }
    }

    // ── 필터 바텀시트 ──
    function renderFilterCatChips() {
      const chips = CATEGORIES.map(c => `
        <div class="chip ${c === '전체' ? 'active' : ''}" data-cat="${c}" onclick="selectCatChip(this)">${c}</div>
      `).join('');
      document.getElementById('catChips').innerHTML = chips;
    }

    function openFilter() {
      document.getElementById('filterOverlay').classList.add('open');
      document.getElementById('filterBtn').classList.add('active');
    }

    function closeFilter() {
      document.getElementById('filterOverlay').classList.remove('open');
      document.getElementById('filterBtn').classList.remove('active');
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('filterOverlay')) closeFilter();
    }

    function selectType(el) {
      document.querySelectorAll('#typeChips .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      pendingType = el.dataset.type;
    }

    function selectDist(el) {
      document.querySelectorAll('#distChips .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      pendingDist = el.dataset.dist;
    }

    function selectCatChip(el) {
      document.querySelectorAll('#catChips .chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      pendingCat = el.dataset.cat;
    }

    function applyFilter() {
      filterType = pendingType;
      filterDist = pendingDist;
      currentCategory = pendingCat;
      renderCategories();
      closeFilter();
      render();
    }

    // ── 이벤트 ──
    document.getElementById('searchInput').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      render();
    });

    // 하트 파티클 (detail과 동일)
    function spawnHeartParticles(container) {
      const colors = ['#ff4141', '#ff7a7a', '#ffb3b3', '#ffd6d6'];
      for (let i = 0; i < 10; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.4;
        const dist = 22 + Math.random() * 16;
        p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
        p.style.background = colors[i % colors.length];
        container.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    document.getElementById('listView').addEventListener('click', e => {
      const btn = e.target.closest('.bookmark-btn');
      if (btn) {
        const idx = parseInt(btn.dataset.idx);
        const item = window._renderedItems?.[idx];
        if (!item) return;
        const name = item['이름'];
        const i = bookmarks.indexOf(name);
        const becameSaved = i === -1;
        if (becameSaved) bookmarks.push(name);
        else bookmarks.splice(i, 1);
        localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
        pushBookmarks(bookmarks);
        btn.querySelector('svg path').setAttribute('fill', becameSaved ? '#ff4141' : '#ddd');
        btn.classList.remove('bump');
        void btn.offsetWidth;
        btn.classList.add('bump');
        if (becameSaved) {
          spawnHeartParticles(btn);
          CollectionPicker.open(name);
        } else {
          CollectionPicker.removeFromAll(name);
        }
        return;
      }
      const card = e.target.closest('.restaurant-card');
      if (card) {
        const item = window._renderedItems?.[parseInt(card.dataset.idx)];
        if (item) { sessionStorage.setItem('detailItem', JSON.stringify(item)); location.href = '/detail'; }
      }
    });

    // URL 파라미터로 초기 필터 설정
    const _params = new URLSearchParams(location.search);
    const _urlCat = _params.get('cat');
    const _urlType = _params.get('type');
    if (_urlCat) currentCategory = _urlCat;
    if (_urlType) filterType = _urlType;

    loadData();
    renderUserBadge('authArea');
    Promise.all([syncBookmarks(), syncVisited()]).then(() => {
      bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
      visited = JSON.parse(localStorage.getItem('visited') || '[]');
      render();
    });
  </script>
</body>
</html>
