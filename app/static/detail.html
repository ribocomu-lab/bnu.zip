<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bab 밥 in PNU</title>
  <meta name="description" content="Bab 밥 Navigation for U — 부산대 맛집·카페 길잡이" />
  <meta property="og:title" content="Bab 밥 in PNU" />

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://pnueat-backend.onrender.com" />

  <meta name="twitter:title" content="Bab 밥 in PNU" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Poppins:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      font-family: 'Inter', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    }
    .phone {
      width: 430px;
      height: 844px;
      background: #fff;
      border: 1px solid #bbb;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* 히어로 */
    .hero {
      width: 100%;
      height: 342px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      font-size: 72px;
      overflow: hidden;
    }
    .hero-photo {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgb(0,0,0) 0%, rgba(0,0,0,0) 43.75%, rgba(38,78,113,0) 71.635%, rgb(75,156,225) 100%);
      z-index: 1;
    }
    .hero-back, .hero-save { z-index: 3; }
    #heroEmoji { z-index: 2; position: relative; }
    .hero-back {
      position: absolute;
      top: 39px; left: 24px;
      width: 36px; height: 36px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-back svg { width: 12px; height: 20px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35)); }
    .hero-save {
      position: absolute;
      top: 39px; right: 24px;
      width: 38px; height: 38px;
      background: none;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .hero-save svg { width: 23px; height: 21px; transition: fill 0.15s; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.35)); }
    .hero-save.bump { animation: heartBump 0.45s ease; }
    @keyframes heartBump {
      0% { transform: scale(1); }
      30% { transform: scale(1.4); }
      55% { transform: scale(0.9); }
      100% { transform: scale(1); }
    }
    .particle {
      position: absolute;
      top: 50%; left: 50%;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4141;
      pointer-events: none;
      z-index: 4;
      animation: particleBurst 0.7s ease-out forwards;
    }
    @keyframes particleBurst {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) scale(0); opacity: 0; }
    }

    /* 스크롤 영역 (둥근 카드) */
    .scroll-body {
      flex: 1; overflow-y: auto; min-height: 0; transform: translateZ(0);
      background: #fff;
      border-radius: 47px 47px 0 0;
      margin-top: -69px;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 6px rgba(0,0,0,0.25);
      padding-top: 33px;
      scrollbar-width: none;
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* 기본 정보 */
    .info-section {
      padding: 0 30px;
    }
    .name-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .rest-name {
      font-family: 'Poppins', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      font-size: 24px; font-weight: 700; color: #050505;
      letter-spacing: -0.24px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
    }
    .cat-badge {
      display: inline-block;
      font-size: 12px; font-weight: 500; color: #005ba9;
      background: #fff;
      border: 1px solid #5888b2;
      border-radius: 22px;
      padding: 8px 15px 9px;
      letter-spacing: -0.48px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .star-rating {
      display: flex; align-items: center; gap: 1px;
      margin-top: 4px; margin-bottom: 16px;
    }
    .star-rating .star-ico { color: #f5b400; font-size: 26px; line-height: 1; }
    .star-rating #starValue { font-size: 16px; font-weight: 700; color: #ffbe0c; letter-spacing: -0.16px; }
    .star-rating .review-cnt { font-size: 11px; font-weight: 500; color: #999; margin-left: 3px; }
    .star-rating.empty .star-ico { color: #ccc; }
    .star-rating.empty #starValue { color: #ccc; }
    /* 리뷰 평균 별점 (파란색, 노란 별점 옆 병기) */
    .rv-top { display: none; align-items: center; gap: 1px; margin-left: 10px; }
    .rv-top.show { display: flex; }
    .rv-top .star-ico { color: #005ba9; }
    .rv-top .rv-top-value { font-size: 16px; font-weight: 700; color: #005ba9; letter-spacing: -0.16px; }
    .rv-top .review-cnt { color: #5888b2; }
    .detail-row {
      display: flex; align-items: center;
      gap: 6px; margin-bottom: 8px;
    }
    .detail-icon {
      flex-shrink: 0; width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .detail-icon svg { width: 100%; height: 100%; }
    .detail-text { font-size: 12px; color: #050505; letter-spacing: -0.12px; }
    .detail-dist { font-weight: 700; }
    .detail-addr { font-weight: 500; margin-left: 5px; }
    .detail-copy { font-weight: 500; color: #005ba9; text-decoration: underline; margin-left: 5px; cursor: pointer; }
    .detail-copy:active { opacity: 0.6; }
    .detail-phone { font-weight: 500; color: #050505; text-decoration: none; }
    .detail-hours { font-size: 13px; letter-spacing: 0; }

    /* 사진 갤러리 */
    .photo-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding: 10px 30px;
      margin-top: 4px;
      flex-shrink: 0;
    }
    .photo-strip::-webkit-scrollbar { display: none; }
    .photo-strip-item {
      flex-shrink: 0;
      width: 90px; height: 90px;
      border-radius: 12px;
      overflow: hidden;
      background: #f0f0f0;
      cursor: pointer;
    }
    .photo-strip-item img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* 사진 전체화면 뷰어 */
    .photo-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 400;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .photo-viewer.open { display: flex; }
    .photo-viewer img {
      max-width: 100%; max-height: 80vh;
      object-fit: contain;
      border-radius: 4px;
    }
    .photo-viewer-close {
      position: absolute;
      top: 16px; right: 16px;
      background: rgba(255,255,255,0.15);
      border: none; color: #fff;
      font-size: 22px; width: 40px; height: 40px;
      border-radius: 20px; cursor: pointer;
    }
    .photo-viewer-nav {
      display: flex; gap: 24px; margin-top: 16px;
    }
    .photo-viewer-nav button {
      background: rgba(255,255,255,0.15);
      border: none; color: #fff;
      font-size: 18px; width: 44px; height: 44px;
      border-radius: 22px; cursor: pointer;
    }
    .photo-viewer-counter {
      color: rgba(255,255,255,0.6);
      font-size: 13px; margin-top: 8px;
    }

    /* 섹션 공통 (피그마: 제목 + 전체보기 ► + 구분선) */
    .section { padding: 14px 30px; }
    .section-head {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid #c1c1c1;
      margin-bottom: 12px;
    }
    .section-title {
      font-family: 'Poppins', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      font-size: 14px; font-weight: 700; color: #191919;
      letter-spacing: -0.14px;
    }
    .section-more {
      font-size: 12px; font-weight: 500; color: #5888b2;
      letter-spacing: -0.48px;
      background: none; border: none; cursor: pointer;
      padding: 0;
    }
    .section-more:active { opacity: 0.6; }

    /* 리뷰 */
    .rv-summary {
      display: flex; align-items: baseline; gap: 8px;
      margin-bottom: 14px;
    }
    .rv-summary .rv-avg { font-size: 20px; font-weight: 700; color: #005ba9; }
    .rv-summary .rv-count { font-size: 13px; color: #666; }
    .rv-form { margin-bottom: 14px; }
    .rv-stars { display: flex; gap: 4px; font-size: 26px; color: #ddd; cursor: pointer; margin-bottom: 10px; user-select: none; }
    .rv-stars span.active { color: #005ba9; }
    /* 모임 형태 선택 태그 */
    .rv-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .rv-tag {
      height: 27px; padding: 0 12px;
      display: flex; align-items: center;
      border: 0.5px solid #828282; border-radius: 22px;
      font-size: 11px; font-weight: 500; letter-spacing: -0.44px;
      color: #333; background: #fff; cursor: pointer;
      user-select: none;
    }
    .rv-tag.active { border-color: #005ba9; background: #005ba9; color: #fff; font-weight: 700; }
    .rv-item-tag {
      font-size: 10px; font-weight: 500; color: #005ba9;
      background: #ddf0ff; border-radius: 22px;
      padding: 2px 8px; margin-left: 6px;
      white-space: nowrap;
    }
    .rv-textarea {
      width: 100%; min-height: 64px; border: 1px solid #e0e0e0; border-radius: 12px;
      padding: 10px 12px; font-size: 13px; resize: none; font-family: inherit;
      margin-bottom: 8px; outline: none;
      background: linear-gradient(180deg, #fff 35.096%, #fff4d5 100%);
    }
    .rv-textarea::placeholder { color: #aaa; }
    .rv-textarea:focus { border-color: #005ba9; }
    .rv-submit {
      width: 100%; height: 42px; background: #005ba9; color: #fff;
      border: none; border-radius: 30px; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .rv-submit:active { opacity: 0.85; }
    .rv-submit:disabled { background: #ccc; cursor: not-allowed; }
    .rv-login-prompt {
      text-align: center; padding: 14px; font-size: 12px; color: #888;
      background: #fafafa; border-radius: 8px; margin-bottom: 14px;
    }
    .rv-login-prompt a { color: #005ba9; font-weight: 600; text-decoration: none; }
    .rv-item { padding: 10px 0; border-bottom: 1px solid #eee; }
    .rv-item:last-child { border-bottom: none; }
    .rv-item.rv-hidden { display: none; }
    .rv-item-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .rv-item-name { font-size: 12px; font-weight: 700; color: #333; }
    .rv-item-stars { color: #005ba9; font-size: 12px; letter-spacing: 1px; }
    .rv-item-text { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 4px; white-space: pre-wrap; }
    .rv-item-foot { display: flex; align-items: center; justify-content: space-between; }
    .rv-item-date { font-size: 11px; color: #aaa; }
    .rv-item-del { font-size: 11px; color: #aaa; background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
    .rv-empty { font-size: 12px; color: #aaa; text-align: center; padding: 20px 0; line-height: 1.6; }

    /* 지도 */
    #detailMap {
      width: 100%;
      height: 164px;
      border-radius: 12px;
      overflow: hidden;
      background: #f0f0f0;
    }

    /* 비슷한 밥.zip / 가까운 커피.zip */
    .similar-scroll {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }
    .similar-scroll::-webkit-scrollbar { display: none; }
    .similar-card {
      flex-shrink: 0;
      width: 100px;
      cursor: pointer;
    }
    .similar-card:active { opacity: 0.7; }
    .similar-thumb {
      width: 100px; height: 76px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin-bottom: 6px;
    }
    .similar-name { font-size: 12px; font-weight: 600; color: #111; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .similar-dist { font-size: 11px; color: #aaa; }

    /* 하단 CTA */
    .bottom-cta {
      padding: 15px 16px;
      display: flex;
      gap: 12px;
      align-items: center;
      background: #fff;
      flex-shrink: 0;
    }
    .cta-share {
      width: 56px; height: 56px; flex-shrink: 0;
      border: 1px solid #aaa; border-radius: 12px;
      background: #fff; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .cta-share svg { width: 24px; height: 24px; }
    .cta-share:active { background: #f8f8f8; }
    .cta-primary {
      flex: 1; height: 56px;
      background: #dbe8f3; border: none;
      border-radius: 12px;
      font-size: 16px; font-weight: 700; color: #000;
      letter-spacing: -0.64px;
      cursor: pointer;
      font-family: inherit;
    }
    .cta-primary:active { opacity: 0.85; }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%; transform: translateX(-50%);
      background: #111; color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px; font-weight: 600;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    /* 저장 모달 */
    .save-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      justify-content: center;
      align-items: flex-end;
    }
    .save-overlay.open { display: flex; }
    .save-sheet {
      width: 430px;
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px;
      animation: slideUp 0.22s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .sheet-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
    .sheet-title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 14px; text-align: center; }
    .save-option {
      width: 100%; height: 50px;
      border: 1.5px solid #eee;
      border-radius: 10px;
      background: #fff;
      font-size: 14px; color: #333;
      cursor: pointer;
      display: flex; align-items: center; gap: 10px;
      padding: 0 16px;
      margin-bottom: 8px;
    }
    .save-option:active { background: #f8f8f8; }
    .save-option.active { border-color: #111; background: #f5f5f5; font-weight: 700; }
    .save-option.cancel { color: #aaa; border-color: #f0f0f0; margin-top: 4px; }

    /* 길찾기 모달 */
    .nav-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 200;
      justify-content: center;
      align-items: flex-end;
    }
    .nav-overlay.open { display: flex; }
    .nav-sheet {
      width: 430px;
      background: #fff;
      border-radius: 16px 16px 0 0;
      padding: 20px 20px 32px;
      animation: slideUp 0.22s ease;
    }
    .nav-option {
      width: 100%; height: 52px;
      border: 1.5px solid #eee;
      border-radius: 12px;
      background: #fff;
      font-size: 14px; color: #222;
      cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      padding: 0 18px;
      margin-bottom: 10px;
      font-weight: 600;
    }
    .nav-option:active { background: #f8f8f8; }
    .nav-option.cancel { color: #aaa; border-color: #f0f0f0; margin-top: 4px; font-weight: 400; }
    .nav-icon-img { width: 22px; height: 22px; border-radius: 6px; object-fit: contain; }
  </style>
</head>
<body>
  <div class="phone">

    <div class="hero" id="hero">
      <button class="hero-back" onclick="history.back()" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M10 22L0 12L10 2L11.775 3.775L3.55 12L11.775 20.225L10 22Z" fill="white"/></svg>
      </button>
      <div id="heroEmoji">🍽</div>
      <button class="hero-save" id="heroSaveBtn" onclick="toggleBookmark()" aria-label="저장">
        <svg viewBox="0 0 21.6667 19.8792" fill="none" xmlns="http://www.w3.org/2000/svg"><path id="heroHeartPath" d="M10.8333 19.8792L9.2625 18.4708C7.43889 16.8278 5.93125 15.4104 4.73958 14.2188C3.54792 13.0271 2.6 11.9573 1.89583 11.0094C1.19167 10.0615 0.699653 9.19028 0.419792 8.39583C0.139931 7.60139 0 6.78889 0 5.95833C0 4.26111 0.56875 2.84375 1.70625 1.70625C2.84375 0.56875 4.26111 0 5.95833 0C6.89722 0 7.79097 0.198611 8.63958 0.595833C9.48819 0.993056 10.2194 1.55278 10.8333 2.275C11.4472 1.55278 12.1785 0.993056 13.0271 0.595833C13.8757 0.198611 14.7694 0 15.7083 0C17.4056 0 18.8229 0.56875 19.9604 1.70625C21.0979 2.84375 21.6667 4.26111 21.6667 5.95833C21.6667 6.78889 21.5267 7.60139 21.2469 8.39583C20.967 9.19028 20.475 10.0615 19.7708 11.0094C19.0667 11.9573 18.1187 13.0271 16.9271 14.2188C15.7354 15.4104 14.2278 16.8278 12.4042 18.4708L10.8333 19.8792Z" fill="white"/></svg>
      </button>
    </div>

    <div class="scroll-body">

      <div class="info-section">
        <div class="name-row">
          <div class="rest-name" id="restName">-</div>
          <div class="cat-badge" id="catBadge"></div>
        </div>
        <div class="star-rating" id="starRating" style="display:none">
          <span class="star-ico">★</span>
          <span id="starValue">-</span>
          <span class="review-cnt" id="reviewCntInline"></span>
          <span class="rv-top" id="rvTopRating">
            <span class="star-ico">★</span>
            <span class="rv-top-value" id="rvTopValue">0</span>
            <span class="review-cnt" id="rvTopCnt"></span>
          </span>
        </div>
        <div id="infoRows"></div>
      </div>

      <!-- 사진 갤러리 (스크립트에서 동적 생성) -->
      <div class="photo-strip" id="photoStrip" style="display:none"></div>

      <div class="section">
        <div class="section-head">
          <div class="section-title">부산대생의 생생한 리뷰</div>
          <button class="section-more" id="reviewMoreBtn" onclick="location.href='/reviews'" style="display:none">전체보기 ►</button>
        </div>
        <div class="rv-summary" id="reviewSummary"></div>

        <div id="reviewForm" class="rv-form" style="display:none">
          <div class="rv-stars" id="reviewStars">
            <span data-v="1">★</span><span data-v="2">★</span><span data-v="3">★</span><span data-v="4">★</span><span data-v="5">★</span>
          </div>
          <div class="rv-tags" id="reviewTags">
            <div class="rv-tag" data-tag="선후배 1:1">선후배 1:1</div>
            <div class="rv-tag" data-tag="선후배 1:2">선후배 1:2</div>
            <div class="rv-tag" data-tag="선후배 2:2">선후배 2:2</div>
            <div class="rv-tag" data-tag="단체모임">단체모임</div>
          </div>
          <textarea id="reviewText" class="rv-textarea" rows="3" placeholder="이 식당은 어땠나요?"></textarea>
          <button class="rv-submit" id="reviewSubmitBtn" onclick="submitReview()">리뷰 등록</button>
        </div>

        <div id="reviewLoginPrompt" class="rv-login-prompt" style="display:none">
          리뷰를 작성하려면 <a href="/login">로그인</a>이 필요해요.
        </div>

        <div id="reviewList"></div>
        <div id="reviewEmpty" class="rv-empty" style="display:none">
          아직 작성된 리뷰가 없어요. 첫 리뷰를 남겨보세요!
        </div>
      </div>

      <div class="section">
        <div class="section-head">

    const PNU = { lat: 35.2323, lng: 129.0876 };

    const ICON_DISTANCE = `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.11659 14.1084C4.37214 13.7362 3.99992 13.2556 3.99992 12.6667C3.99992 12.4 4.08047 12.1528 4.24159 11.925C4.4027 11.6973 4.6277 11.5 4.91659 11.3334L5.96659 12.3167C5.86659 12.3612 5.75825 12.4112 5.64159 12.4667C5.52492 12.5223 5.43325 12.5889 5.36659 12.6667C5.51103 12.8445 5.84436 13 6.36659 13.1334C6.88881 13.2667 7.43325 13.3334 7.99992 13.3334C8.56659 13.3334 9.11381 13.2667 9.64159 13.1334C10.1694 13 10.5055 12.8445 10.6499 12.6667C10.5721 12.5778 10.4721 12.5056 10.3499 12.45C10.2277 12.3945 10.111 12.3445 9.99992 12.3L11.0333 11.3C11.3444 11.4778 11.5833 11.6806 11.7499 11.9084C11.9166 12.1362 11.9999 12.3889 11.9999 12.6667C11.9999 13.2556 11.6277 13.7362 10.8833 14.1084C10.1388 14.4806 9.1777 14.6667 7.99992 14.6667C6.82214 14.6667 5.86103 14.4806 5.11659 14.1084ZM8.01659 11C9.11659 10.1889 9.94436 9.37504 10.4999 8.55837C11.0555 7.74171 11.3333 6.92226 11.3333 6.10004C11.3333 4.96671 10.9721 4.11115 10.2499 3.53337C9.5277 2.9556 8.7777 2.66671 7.99992 2.66671C7.22214 2.66671 6.47214 2.9556 5.74992 3.53337C5.0277 4.11115 4.66659 4.96671 4.66659 6.10004C4.66659 6.84449 4.93881 7.61949 5.48325 8.42504C6.0277 9.2306 6.87214 10.0889 8.01659 11ZM7.99992 12.6667C6.43325 11.5112 5.26381 10.3889 4.49159 9.30004C3.71936 8.21115 3.33325 7.14449 3.33325 6.10004C3.33325 5.31115 3.47492 4.61949 3.75825 4.02504C4.04159 3.4306 4.40547 2.93337 4.84992 2.53337C5.29436 2.13337 5.79436 1.83337 6.34992 1.63337C6.90547 1.43337 7.45547 1.33337 7.99992 1.33337C8.54436 1.33337 9.09436 1.43337 9.64992 1.63337C10.2055 1.83337 10.7055 2.13337 11.1499 2.53337C11.5944 2.93337 11.9583 3.4306 12.2416 4.02504C12.5249 4.61949 12.6666 5.31115 12.6666 6.10004C12.6666 7.14449 12.2805 8.21115 11.5083 9.30004C10.736 10.3889 9.56659 11.5112 7.99992 12.6667ZM7.99992 7.33337C8.36659 7.33337 8.68047 7.20282 8.94159 6.94171C9.2027 6.6806 9.33325 6.36671 9.33325 6.00004C9.33325 5.63337 9.2027 5.31949 8.94159 5.05837C8.68047 4.79726 8.36659 4.66671 7.99992 4.66671C7.63325 4.66671 7.31936 4.79726 7.05825 5.05837C6.79714 5.31949 6.66659 5.63337 6.66659 6.00004C6.66659 6.36671 6.79714 6.6806 7.05825 6.94171C7.31936 7.20282 7.63325 7.33337 7.99992 7.33337Z" fill="#1C1B1F"/></svg>`;
    const ICON_CALL = `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13.3 14C11.9111 14 10.5389 13.6972 9.18333 13.0917C7.82778 12.4861 6.59444 11.6278 5.48333 10.5167C4.37222 9.40556 3.51389 8.17222 2.90833 6.81667C2.30278 5.46111 2 4.08889 2 2.7C2 2.5 2.06667 2.33333 2.2 2.2C2.33333 2.06667 2.5 2 2.7 2H5.4C5.55556 2 5.69444 2.05278 5.81667 2.15833C5.93889 2.26389 6.01111 2.38889 6.03333 2.53333L6.46667 4.86667C6.48889 5.04444 6.48333 5.19444 6.45 5.31667C6.41667 5.43889 6.35556 5.54444 6.26667 5.63333L4.65 7.26667C4.87222 7.67778 5.13611 8.075 5.44167 8.45833C5.74722 8.84167 6.08333 9.21111 6.45 9.56667C6.79444 9.91111 7.15556 10.2306 7.53333 10.525C7.91111 10.8194 8.31111 11.0889 8.73333 11.3333L10.3 9.76667C10.4 9.66667 10.5306 9.59167 10.6917 9.54167C10.8528 9.49167 11.0111 9.47778 11.1667 9.5L13.4667 9.96667C13.6222 10.0111 13.75 10.0917 13.85 10.2083C13.95 10.325 14 10.4556 14 10.6V13.3C14 13.5 13.9333 13.6667 13.8 13.8C13.6667 13.9333 13.5 14 13.3 14ZM4.01667 6L5.11667 4.9L4.83333 3.33333H3.35C3.40556 3.78889 3.48333 4.23889 3.58333 4.68333C3.68333 5.12778 3.82778 5.56667 4.01667 6ZM9.98333 11.9667C10.4167 12.1556 10.8583 12.3056 11.3083 12.4167C11.7583 12.5278 12.2111 12.6 12.6667 12.6333V11.1667L11.1 10.85L9.98333 11.9667Z" fill="#1C1B1F"/></svg>`;
    const ICON_ALARM = `<svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5.65824 14.1916C4.93046 13.875 4.29712 13.4472 3.75824 12.9083C3.21935 12.3694 2.79157 11.7361 2.4749 11.0083C2.15824 10.2805 1.9999 9.49998 1.9999 8.66665C1.9999 7.83332 2.15824 7.05276 2.4749 6.32498C2.79157 5.59721 3.21935 4.96387 3.75824 4.42498C4.29712 3.88609 4.93046 3.45832 5.65824 3.14165C6.38601 2.82498 7.16657 2.66665 7.9999 2.66665C8.83324 2.66665 9.61379 2.82498 10.3416 3.14165C11.0693 3.45832 11.7027 3.88609 12.2416 4.42498C12.7805 4.96387 13.2082 5.59721 13.5249 6.32498C13.8416 7.05276 13.9999 7.83332 13.9999 8.66665C13.9999 9.49998 13.8416 10.2805 13.5249 11.0083C13.2082 11.7361 12.7805 12.3694 12.2416 12.9083C11.7027 13.4472 11.0693 13.875 10.3416 14.1916C9.61379 14.5083 8.83324 14.6666 7.9999 14.6666C7.16657 14.6666 6.38601 14.5083 5.65824 14.1916ZM9.86657 11.4667L10.7999 10.5333L8.66657 8.39998V5.33332H7.33324V8.93332L9.86657 11.4667ZM3.73324 1.56665L4.66657 2.49998L1.83324 5.33332L0.899902 4.39998L3.73324 1.56665ZM12.2666 1.56665L15.0999 4.39998L14.1666 5.33332L11.3332 2.49998L12.2666 1.56665ZM7.9999 13.3333C9.2999 13.3333 10.4027 12.8805 11.3082 11.975C12.2138 11.0694 12.6666 9.96665 12.6666 8.66665C12.6666 7.36665 12.2138 6.26387 11.3082 5.35832C10.4027 4.45276 9.2999 3.99998 7.9999 3.99998C6.6999 3.99998 5.59713 4.45276 4.69157 5.35832C3.78601 6.26387 3.33324 7.36665 3.33324 8.66665C3.33324 9.96665 3.78601 11.0694 4.69157 11.975C5.59713 12.8805 6.6999 13.3333 7.9999 13.3333Z" fill="#1C1B1F"/></svg>`;

    let item = null;
    let bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
    let visited = JSON.parse(localStorage.getItem('visited') || '[]');
    let viewerPhotos = [], viewerIdx = 0;

    function isBookmarked() { return item && bookmarks.includes(item['이름']); }
    function isVisited() { return item && visited.includes(item['이름']); }

    /* ── 아이템 로드 ── */
    function loadItem() {
      try {
        item = JSON.parse(sessionStorage.getItem('detailItem'));
      } catch {}
      if (!item) { history.back(); return; }
      renderDetail();
      loadSimilar();
      loadNearbyCafes();
      loadMap();
      reviewInit();
    }

    /* ── 상세 렌더 ── */
    function renderDetail() {
      const cat = item['대분류'] || '';
      const emoji = cat === '카페·디저트' || item._type === 'cafe' ? '☕' : (CAT_EMOJI[cat] || '🍽');
      const colors = (HERO_COLORS[cat] || '374151,6b7280').split(',');
      const hero = document.getElementById('hero');

      // 기존 사진/오버레이 제거
      hero.querySelectorAll('.hero-photo, .hero-overlay').forEach(el => el.remove());

      if (item['사진']) {
        const img = document.createElement('img');
        img.className = 'hero-photo';
        img.src = item['사진'];
        img.onerror = () => {
          img.remove();
          hero.querySelector('.hero-overlay')?.remove();
          hero.style.background = `linear-gradient(135deg, #${colors[0]}, #${colors[1]})`;
        };
        const overlay = document.createElement('div');
        overlay.className = 'hero-overlay';
        hero.insertBefore(overlay, hero.firstChild);
        hero.insertBefore(img, hero.firstChild);
        hero.style.background = '';
        document.getElementById('heroEmoji').style.display = 'none';
      } else {
        hero.style.background = `linear-gradient(135deg, #${colors[0]}, #${colors[1]})`;
        document.getElementById('heroEmoji').style.display = '';
        document.getElementById('heroEmoji').textContent = emoji;
      }
      document.getElementById('restName').textContent = item['이름'];
      document.getElementById('catBadge').textContent = '#' + cat;

      // 별점 (이름 아래) — 별점 없으면 회색 별 + (0)
      const ratingEl = document.getElementById('starRating');
      ratingEl.style.display = 'flex';
      if (item['별점'] != null) {
        ratingEl.classList.remove('empty');
        document.getElementById('starValue').textContent = item['별점'];
        document.getElementById('reviewCntInline').textContent = `(${item['리뷰수'] ?? 0})`;
      } else {
        ratingEl.classList.add('empty');
        document.getElementById('starValue').textContent = '0';
        document.getElementById('reviewCntInline').textContent = '(0)';
      }

      // 정보 행
      const rows = [];
      if (item['주소']) {
        const dist = item['거리(m)'] && item['거리(m)'] !== '-' ? `<span class="detail-dist">${item['거리(m)']}m</span>` : '';
        rows.push(`<div class="detail-row"><div class="detail-icon">${ICON_DISTANCE}</div><div class="detail-text">${dist}<span class="detail-addr">${item['주소']}</span></div></div>`);
      }
      if (item['전화번호']) rows.push(`<div class="detail-row"><div class="detail-icon">${ICON_CALL}</div><div class="detail-text"><a class="detail-phone" href="tel:${item['전화번호']}">${item['전화번호']}</a><span class="detail-copy" onclick="copyPhone()">복사</span></div></div>`);
      if (item['운영시간']?.length) {
        const today = [6,0,1,2,3,4,5][new Date().getDay()]; // 월=0 기준
        const todayText = item['운영시간'][today] || '';
        const timeShort = todayText.replace(/^[^:]+:\s*/, '');
        rows.push(`<div class="detail-row"><div class="detail-icon">${ICON_ALARM}</div><div class="detail-text detail-hours">오늘 ${timeShort}</div></div>`);
      }
      document.getElementById('infoRows').innerHTML = rows.join('');

      // 사진 갤러리
      renderPhotoStrip();

      updateSaveIcon();
    }

    function renderPhotoStrip() {
      const photos = item['사진목록'];
      const strip = document.getElementById('photoStrip');
      if (!photos || photos.length < 2) { strip.style.display = 'none'; return; }
      viewerPhotos = photos;
      strip.style.display = 'flex';
      strip.innerHTML = photos.map((url, i) => `
        <div class="photo-strip-item" onclick="openViewer(${i})">
          <img src="${url}" onerror="this.parentElement.style.display='none'" />
        </div>`).join('');
    }

    /* ── 전화번호 복사 ── */
    function copyPhone() {
      if (!item || !item['전화번호']) return;
      navigator.clipboard?.writeText(item['전화번호']).then(() => showToast('전화번호가 복사됐어요'));
    }

    /* ── 사진 전체화면 뷰어 ── */
    function openViewer(idx) {
      viewerIdx = idx;
      document.getElementById('photoViewer').classList.add('open');
      updateViewer();
    }
    function closeViewer() {
      document.getElementById('photoViewer').classList.remove('open');
    }
    function updateViewer() {
      document.getElementById('viewerImg').src = viewerPhotos[viewerIdx];
      document.getElementById('viewerCounter').textContent = `${viewerIdx + 1} / ${viewerPhotos.length}`;
    }
    function viewerPrev() { viewerIdx = (viewerIdx - 1 + viewerPhotos.length) % viewerPhotos.length; updateViewer(); }
    function viewerNext() { viewerIdx = (viewerIdx + 1) % viewerPhotos.length; updateViewer(); }

    function updateSaveIcon() {
      const heart = document.getElementById('heroHeartPath');
      heart.setAttribute('fill', isBookmarked() ? '#ff4141' : 'white');
    }

    /* ── 하트 파티클 애니메이션 ── */
    function spawnHeartParticles(container) {
      const colors = ['#ff4141', '#ff7a7a', '#ffb3b3', '#ffd6d6'];
      for (let i = 0; i < 10; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.4;
        const dist = 22 + Math.random() * 16;
        p.style.setProperty('--dx', `${Math.cos(angle) * dist}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * dist}px`);
        p.style.background = colors[i % colors.length];
        container.appendChild(p);
        p.addEventListener('animationend', () => p.remove());
      }
    }

    /* ── 하트 직접 북마크 토글 ── */
    function toggleBookmark() {
      if (!item) return;
      const name = item['이름'];
      const current = JSON.parse(localStorage.getItem('bookmarks') || '[]');
      const idx = current.indexOf(name);
      const becameSaved = idx === -1;
      if (becameSaved) {
        current.push(name);
        showToast('저장한 곳에 추가됐어요 🔖');
      } else {
        current.splice(idx, 1);
        showToast('저장한 곳에서 삭제됐어요');
      }
      bookmarks = current;
      localStorage.setItem('bookmarks', JSON.stringify(current));
      pushBookmarks(current);
      updateSaveIcon();

      const btn = document.getElementById('heroSaveBtn');
      btn.classList.remove('bump');
      void btn.offsetWidth;
      btn.classList.add('bump');
      if (becameSaved) {
        spawnHeartParticles(btn);
        CollectionPicker.open(name);
      } else {
        CollectionPicker.removeFromAll(name);
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function toggleList(type) {
      if (!item) return;
      const name = item['이름'];
      if (type === 'saved') {
        const current = JSON.parse(localStorage.getItem('bookmarks') || '[]');
        const i = current.indexOf(name);
        if (i === -1) { current.push(name); showToast('저장한 곳에 추가됐어요 🔖'); }
        else { current.splice(i, 1); showToast('저장한 곳에서 삭제됐어요'); }
        bookmarks = current;
        localStorage.setItem('bookmarks', JSON.stringify(current));
        pushBookmarks(current);
      } else {
        const current = JSON.parse(localStorage.getItem('visited') || '[]');
        const i = current.indexOf(name);
        if (i === -1) { current.push(name); showToast('가본 곳에 추가됐어요 ✅'); }
        else { current.splice(i, 1); showToast('가본 곳에서 삭제됐어요'); }
        visited = current;
        localStorage.setItem('visited', JSON.stringify(current));
        pushVisited(current);
      }
      updateSaveIcon();
      closeSaveModal();
    }

    function closeSaveModal() {
      document.getElementById('saveOverlay').classList.remove('open');
    }

    /* ── 길찾기 ── */
    function navigate() {
      document.getElementById('navOverlay').classList.add('open');
    }
    function closeNavModal() {
      document.getElementById('navOverlay').classList.remove('open');
    }
    function openKakaoMap() {
      closeNavModal();
      const lat = item.lat, lng = item.lng, name = item['이름'];
      if (lat && lng) {
        window.open(`https://map.kakao.com/link/to/${encodeURIComponent(name)},${lat},${lng}`);
      } else {
        window.open(`https://map.kakao.com/?q=${encodeURIComponent(name + ' 부산대')}`);
      }
    }
    function openNaverMap() {
      closeNavModal();
      const lat = item.lat, lng = item.lng, name = item['이름'];
      if (lat && lng) {
        window.open(`https://map.naver.com/v5/search/${encodeURIComponent(name)}`);
      } else {
        window.open(`https://map.naver.com/v5/search/${encodeURIComponent(name + ' 부산대')}`);
      }
    }
    function openGoogleMap() {
      closeNavModal();
      const lat = item.lat, lng = item.lng, name = item['이름'];
      if (lat && lng) {
        window.open(`https://www.google.com/maps/search/?api=1&query=${lat},${lng}`);
      } else {
        window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' 부산 금정구')}`);
      }
    }

    /* ── 공유 ── */
    function shareItem() {
      const title = 'Bab 밥 in PNU';
      const text = `${item['이름']} — Bab 밥 Navigation for U`;
      if (navigator.share) {
        navigator.share({ title, text, url: location.href }).catch(() => {});
      } else {
        navigator.clipboard?.writeText(`${text}\n${location.href}`).then(() => showToast('링크가 복사됐어요!'));
      }
    }

    /* ── 비슷한 밥.zip ── */
    async function loadSimilar() {
      try {
        const [food, cafe] = await Promise.all([
          fetch('/api/food').then(r => r.json()),
          fetch('/api/cafe').then(r => r.json()),
        ]);
        const cat = item['대분류'];
        const all = [...food.map(i=>({...i,_type:'food'})), ...cafe.map(i=>({...i,_type:'cafe'}))];
        const similar = all
          .filter(i => i['이름'] !== item['이름'] && i['대분류'] === cat)
          .sort((a,b) => {
            const da = parseInt(a['거리(m)']) || 9999;
            const db = parseInt(b['거리(m)']) || 9999;
            return da - db;
          })
          .slice(0, 6);

        if (similar.length === 0) {
          document.getElementById('similarScroll').innerHTML = '<div style="font-size:13px;color:#aaa">비슷한 식당이 없어요</div>';
          return;
        }

        document.getElementById('similarScroll').innerHTML = similar.map(s => {
          const em = CAT_EMOJI[s['대분류']] || (s._type === 'cafe' ? '☕' : '🍽');
          const colors = (HERO_COLORS[s['대분류']] || '374151,6b7280').split(',');
          const dist = s['거리(m)'] && s['거리(m)'] !== '-' ? s['도보시간'] : '';
          const thumbContent = s['사진']
            ? `<img src="${s['사진']}" style="width:100%;height:100%;object-fit:cover;border-radius:8px" onerror="this.style.display='none'">`
            : em;
          const thumbBg = s['사진'] ? '#f4f4f4' : `linear-gradient(135deg,#${colors[0]},#${colors[1]})`;
          return `
            <div class="similar-card" onclick="openSimilar(${JSON.stringify(s).replace(/"/g,'&quot;')})">
              <div class="similar-thumb" style="background:${thumbBg}">${thumbContent}</div>
              <div class="similar-name">${s['이름']}</div>
              <div class="similar-dist">${dist}</div>
            </div>`;
        }).join('');
      } catch {}
    }

    function openSimilar(s) {
      sessionStorage.setItem('detailItem', JSON.stringify(s));
      location.reload();
    }

    /* ── 가까운 커피.zip ── */
    async function loadNearbyCafes() {
      try {
        const cafes = await fetch('/api/cafe').then(r => r.json());
        let sorted;
        if (item.lat && item.lng) {
          sorted = cafes
            .filter(c => c.lat && c.lng)
            .map(c => ({ ...c, _d: Math.hypot(c.lat - item.lat, c.lng - item.lng) }))
            .sort((a, b) => a._d - b._d)
            .slice(0, 6);
        } else {
          const rDist = parseInt(item['거리(m)']) || 500;
          sorted = [...cafes]
            .sort((a, b) => Math.abs((parseInt(a['거리(m)'])||999) - rDist) - Math.abs((parseInt(b['거리(m)'])||999) - rDist))
            .slice(0, 6);
        }

        if (!sorted.length) {
          document.getElementById('nearbyCafeScroll').innerHTML = '<div style="font-size:13px;color:#aaa">주변 카페 정보 없음</div>';
          return;
        }

        document.getElementById('nearbyCafeScroll').innerHTML = sorted.map(c => {
          const dist = c['거리(m)'] && c['거리(m)'] !== '-' ? c['도보시간'] : '';
          const imgHtml = c['사진']
            ? `<img src="${c['사진']}" style="width:100%;height:100%;object-fit:cover;border-radius:8px" onerror="this.outerHTML='☕'">`
            : '☕';
          return `
            <div class="similar-card" onclick="openSimilar(${JSON.stringify({...c,_type:'cafe'}).replace(/"/g,'&quot;')})">
              <div class="similar-thumb" style="background:#fff3e0;font-size:28px">${imgHtml}</div>
              <div class="similar-name">${c['이름']}</div>
              <div class="similar-dist">${dist}</div>
            </div>`;
        }).join('');
      } catch {}
    }

    /* ── 지도 ── */
    function loadLeaflet() {
      return new Promise(resolve => {
        if (window.L) { resolve(); return; }
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
        document.head.appendChild(link);
        const s = document.createElement('script');
        s.onload = resolve;
        s.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
        document.head.appendChild(s);
      });
    }

    async function loadMap() {
      const mapDiv = document.getElementById('detailMap');

      const hasCoord = item.lat && item.lng &&
        !(Math.abs(item.lat - PNU.lat) < 0.0001 && Math.abs(item.lng - PNU.lng) < 0.0001);

      if (!hasCoord) {
        mapDiv.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-size:13px">위치 정보 없음</div>';
        return;
      }

      await loadLeaflet();

      const map = L.map(mapDiv, { zoomControl: true, attributionControl: false })
        .setView([item.lat, item.lng], 16);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

      const redDot = L.divIcon({
        html: '<div style="background:#ea4335;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',
        iconSize: [14, 14], iconAnchor: [7, 7], className: '',
      });
      const blackDot = L.divIcon({
        html: '<div style="background:#111;width:10px;height:10px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',
        iconSize: [10, 10], iconAnchor: [5, 5], className: '',
      });

      L.marker([item.lat, item.lng], { icon: redDot })
        .bindPopup(`<b style="font-size:12px">${item['이름']}</b>`)
        .addTo(map);

      const sameLoc = Math.abs(item.lat - PNU.lat) < 0.001 && Math.abs(item.lng - PNU.lng) < 0.001;
      if (!sameLoc) {
        L.marker([PNU.lat, PNU.lng], { icon: blackDot })
          .bindPopup('<span style="font-size:11px">부산대 정문</span>')
          .addTo(map);
      }
    }

    /* ── 리뷰 (서버 API 기반) ── */
    let rvSelectedStars = 5;
    const RV_PREVIEW_COUNT = 2;
    let rvSelectedTag = '';

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // 익명 닉네임: 이메일 해시 기반이라 같은 사람은 항상 같은 닉네임
    const NICK_ADJ = ['배고픈','행복한','졸린','수줍은','씩씩한','느긋한','야무진','용감한','신난','과제하는','밥약하는','지각한'];
    const NICK_NOUN = ['산지니','금정산다람쥐','넉터비둘기','효원이','웅비탑지킴이','새벽벌요정','문창회관단골','미리내오리','부엉이','곰두리'];
    function anonNick(email) {
      let h = 0;
      for (const ch of String(email || '')) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
      return NICK_ADJ[h % NICK_ADJ.length] + ' ' + NICK_NOUN[Math.floor(h / 7) % NICK_NOUN.length];
    }

    function rvUpdateStars() {
      document.querySelectorAll('#reviewStars span').forEach(s => {
        s.classList.toggle('active', parseInt(s.dataset.v) <= rvSelectedStars);
      });
    }

    function rvInitStars() {
      document.querySelectorAll('#reviewStars span').forEach(s => {
        s.addEventListener('click', () => {
          rvSelectedStars = parseInt(s.dataset.v);
          rvUpdateStars();
        });
      });
      rvUpdateStars();
      // 모임 형태 태그 (한 번 더 누르면 해제)
      document.querySelectorAll('#reviewTags .rv-tag').forEach(t => {
        t.addEventListener('click', () => {
          const isActive = t.classList.contains('active');
          document.querySelectorAll('#reviewTags .rv-tag').forEach(x => x.classList.remove('active'));
          rvSelectedTag = isActive ? '' : t.dataset.tag;
          if (!isActive) t.classList.add('active');
        });
      });
    }

    function reviewInit() {
      rvInitStars();
      const loggedIn = !!getToken();
      document.getElementById('reviewForm').style.display = loggedIn ? 'block' : 'none';
      document.getElementById('reviewLoginPrompt').style.display = loggedIn ? 'none' : 'block';
      loadReviews();
    }

    async function loadReviews() {
      if (!item) return;
      try {
        const res = await fetch(`/api/reviews?restaurant=${encodeURIComponent(item['이름'])}`);
        const data = await res.json();
        renderReviews(data);
      } catch {}
    }

    function renderReviews(data) {
      const { reviews = [], average = 0, count = 0 } = data;

      document.getElementById('reviewSummary').innerHTML = count
        ? `<span class="rv-avg">★ ${average}</span><span class="rv-count">(${count}개 리뷰)</span>`
        : `<span style="color:#aaa;font-size:13px">아직 리뷰가 없어요</span>`;

      // 상단 노란 별점 옆에 리뷰 평균(파란색) 병기
      const topEl = document.getElementById('rvTopRating');
      if (count) {
        document.getElementById('rvTopValue').textContent = average;
        document.getElementById('rvTopCnt').textContent = `(${count})`;
        topEl.classList.add('show');
      } else {
        topEl.classList.remove('show');
      }

      const user = getUser();
      const list = document.getElementById('reviewList');
      const empty = document.getElementById('reviewEmpty');
      const moreBtn = document.getElementById('reviewMoreBtn');

      if (!reviews.length) {
        list.innerHTML = '';
        empty.style.display = 'block';
        moreBtn.style.display = 'none';
        return;
      }
      empty.style.display = 'none';
      moreBtn.style.display = reviews.length > RV_PREVIEW_COUNT ? 'block' : 'none';

      // 상위 2개만 노출, 나머지는 /reviews 전체보기 페이지에서
      list.innerHTML = reviews.slice(0, RV_PREVIEW_COUNT).map(r => {
        const stars = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
        const canDelete = user && user.email === r.user_email;
        return `
          <div class="rv-item">
            <div class="rv-item-head">
              <span class="rv-item-name">${escapeHtml(anonNick(r.user_email))}${r.tag ? `<span class="rv-item-tag">${escapeHtml(r.tag)}</span>` : ''}</span>
              <span class="rv-item-stars">${stars}</span>
            </div>
            <div class="rv-item-text">${escapeHtml(r.text)}</div>
            <div class="rv-item-foot">
              <span class="rv-item-date">${r.created_at.slice(0,10)}</span>
              ${canDelete ? `<button class="rv-item-del" onclick="deleteReview('${r.id}')">삭제</button>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    async function submitReview() {
      const token = getToken();
      if (!token) { location.href = '/login'; return; }
      const text = document.getElementById('reviewText').value.trim();
      if (!text) { alert('리뷰 내용을 입력해주세요.'); return; }

      const btn = document.getElementById('reviewSubmitBtn');
      btn.disabled = true; btn.textContent = '등록 중…';
      try {
        const res = await fetch('/api/reviews', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({ restaurant: item['이름'], rating: rvSelectedStars, text, tag: rvSelectedTag }),
        });
        const data = await res.json();
        if (!res.ok) { alert(data.detail || '등록에 실패했어요.'); return; }
        document.getElementById('reviewText').value = '';
        rvSelectedStars = 5;
        rvSelectedTag = '';
        document.querySelectorAll('#reviewTags .rv-tag').forEach(x => x.classList.remove('active'));
        rvUpdateStars();
        loadReviews();
        showToast('리뷰가 등록됐어요!');
      } catch { alert('네트워크 오류가 발생했어요.'); }
      finally { btn.disabled = false; btn.textContent = '리뷰 등록'; }
    }

    async function deleteReview(id) {
      const token = getToken();
      if (!token) return;
      if (!confirm('리뷰를 삭제할까요?')) return;
      try {
        await fetch(`/api/reviews/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` },
        });
        loadReviews();
        showToast('리뷰가 삭제됐어요');
      } catch {}
    }

    loadItem();
    Promise.all([syncBookmarks(), syncVisited()]).then(() => {
      bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
      visited = JSON.parse(localStorage.getItem('visited') || '[]');
      updateSaveIcon();
    });
  </script>
</body>
